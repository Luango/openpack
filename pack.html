<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
    <title>OpenPack · slash prototype</title>
    <link rel="stylesheet" href="src/base.css" />
    <link rel="stylesheet" href="src/card.css" />
    <style>
      :root {
        color-scheme: dark;
      }
      html, body {
        margin: 0;
        height: 100%;
        background:
          radial-gradient(900px 600px at 50% -10%, rgba(155, 140, 255, 0.12), transparent 60%),
          #0b0d12;
        overflow: hidden;
        font-family: "Inter", system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
        color: #eef1f6;
        /* iOS ignores user-scalable=no, so kill the gestures that zoom/blow up the
           cards: double-tap-to-zoom, the long-press image preview, and selection. */
        touch-action: manipulation;
        -webkit-touch-callout: none;
        -webkit-user-select: none;
        user-select: none;
      }
      img { -webkit-user-drag: none; -webkit-touch-callout: none; }

      #pack-stage {
        position: fixed;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        touch-action: none; /* the slash drives the tear, never scrolls */
        z-index: 2;
        /* the "tell": the hidden hit's tier colour + a 0–1 heat scalar (set by
           pack.setTell). The idle rarity halo + tinted sparks read these so the
           sealed pack foreshadows what's inside. */
        --tell: #ffd49e;
        --idle-heat: 0;
        transition: transform 0.7s cubic-bezier(0.45, 0, 0.7, 0.45), opacity 0.6s;
        will-change: transform, opacity; /* promote a layer so mobile composites the slide smoothly */
      }
      /* once the pack is open, the remaining big half slides off — in the direction
         set by the tear (see pack.js: --exit-*, in px so iOS animates it), away from
         the opening, uncovering the cards behind it */
      body.revealing #pack-stage {
        pointer-events: none;
        transform: translate(var(--exit-x, 0px), var(--exit-y, 0px)) rotate(var(--exit-rot, 0deg));
        opacity: 0;
      }

      /* wraps the pack svg + the spark layer so both bob together on the idle float */
      .pack-wrap {
        position: relative;
        display: inline-block;
        animation: float 5s ease-in-out infinite;
        will-change: transform;
        isolation: isolate; /* contain the light layer's negative z-index behind the foil */
      }
      /* The card's glow, in its OWN layer behind the foil (z-index:-1). It floats with
         the pack, but on exit it counter-slides by the SAME amount #pack-stage moves,
         so it stays put with the card (the bulb) while the foil (the box) slides off.
         Same transition as #pack-stage → the two cancel exactly at every moment. It
         still fades, since it inherits the stage's opacity:0. */
      .pack-light {
        position: absolute;
        inset: 0;
        overflow: visible;
        pointer-events: none;
        z-index: -1;
        transition: transform 0.7s cubic-bezier(0.45, 0, 0.7, 0.45);
      }
      body.revealing .pack-light {
        transform: translate(calc(var(--exit-x, 0px) * -1), calc(var(--exit-y, 0px) * -1));
      }
      .pack {
        display: block;
        width: calc(var(--card-detail-w) * 1.1); /* just larger than the card it holds — hugs the card, not a giant sleeve */
        height: auto;
        overflow: visible;
        cursor: crosshair;
        user-select: none;
        -webkit-user-select: none;
        -webkit-touch-callout: none;
        -webkit-user-drag: none; /* never let a drag lift a ghost copy of the art */
        filter:
          drop-shadow(0 26px 52px rgba(0, 0, 0, 0.6))
          drop-shadow(0 0 13px rgba(255, 210, 156, 0.22)); /* light warm rim glow — breathes via @keyframes rim */
        animation: rim 4.6s ease-in-out infinite; /* float now lives on .pack-wrap (carries the sparks too) */
        opacity: 0; /* stay hidden until the card stack is prepared (pack.js adds .ready) */
        transition: opacity 0.45s ease;
      }
      /* armed = the booster's card stack is rendered behind it; only then does the
         pack fade in so there's never a pack with nothing to open behind it */
      .pack.ready { opacity: 1; }

      /* Rarity TELL halo — a rarity-tinted bloom behind the pack that BREATHES on a
         heartbeat. Its opacity scales with --idle-heat, so it's invisible for a dud
         and only swells in when something rare is sealed inside (the foreshadow).
         Sits behind the foil (z-index:-1, like .pack-light); compositor-only
         (opacity + scale), never animates the filter property. */
      .pack-glow {
        position: absolute;
        left: 50%; top: 50%;
        width: 134%; height: 122%;
        transform: translate(-50%, -50%) scale(1);
        border-radius: 50%;
        pointer-events: none;
        z-index: -1;
        opacity: 0;
        background: radial-gradient(closest-side,
          color-mix(in srgb, var(--tell, #ffd49e) 80%, #fff) 0%,
          var(--tell, #ffb877) 34%,
          transparent 72%);
        filter: blur(16px); /* STATIC blur — never animated */
        mix-blend-mode: screen;
      }
      .pack.ready ~ .pack-glow { animation: heartbeat 4.6s ease-in-out infinite; }
      @keyframes heartbeat {
        0%        { opacity: calc(var(--idle-heat, 0) * 0.5);  transform: translate(-50%, -50%) scale(1); }
        14%       { opacity: calc(var(--idle-heat, 0) * 0.85); transform: translate(-50%, -50%) scale(1.06); }
        28%       { opacity: calc(var(--idle-heat, 0) * 0.6);  transform: translate(-50%, -50%) scale(1.02); }
        46%       { opacity: calc(var(--idle-heat, 0) * 0.78); transform: translate(-50%, -50%) scale(1.05); }
        70%, 100% { opacity: calc(var(--idle-heat, 0) * 0.5);  transform: translate(-50%, -50%) scale(1); }
      }
      @media (prefers-reduced-motion: reduce) {
        .pack.ready ~ .pack-glow { animation: none; opacity: calc(var(--idle-heat, 0) * 0.6); }
      }
      .pack image {
        -webkit-user-drag: none;
        pointer-events: none; /* the <g> handlers drive the tear; the image never grabs the drag */
      }

      /* The tear-trigger guide (drawn in pack.js as .tear-zone): the top & bottom
         crimp strips where a press starts a tear (not the sides or face). Hidden
         until the "Tear zone" toggle adds body.show-tear-zone — a debug aid you toggle. */
      .tear-zone {
        fill: color-mix(in srgb, var(--accent, #6ea8fe) 18%, transparent);
        stroke: var(--accent, #6ea8fe);
        stroke-width: 1.5;
        stroke-dasharray: 7 5;
        pointer-events: none;
        opacity: 0;
        transition: opacity 0.25s ease;
      }
      body.show-tear-zone .tear-zone { opacity: 1; }

      /* the on/off switch sits opposite the nav and bows out during a reveal */
      .app-toggle--floating {
        position: fixed;
        top: 14px;
        right: 14px;
        z-index: 10;
        backdrop-filter: blur(6px);
      }
      body.revealing .app-toggle--floating {
        opacity: 0;
        pointer-events: none;
        transition: opacity 0.3s ease;
      }

      @keyframes float {
        0%, 100% { transform: translateY(-6px) rotate(-0.4deg); }
        50% { transform: translateY(6px) rotate(0.4deg); }
      }
      /* rim light — the warm glow hugging the pack swells and settles */
      @keyframes rim {
        0%, 100% { filter: drop-shadow(0 26px 52px rgba(0,0,0,.6)) drop-shadow(0 0 10px rgba(255,212,158,.15)); }
        50%      { filter: drop-shadow(0 26px 52px rgba(0,0,0,.6)) drop-shadow(0 0 19px rgba(255,216,166,.32)); }
      }

      /* Specular sweep — a warm highlight band rolls across the foil every few
         seconds. The rect + #sheen gradient live in the SVG (see pack.js); screen
         blend brightens the foil it crosses, and the .sealed mask clips it to the pack. */
      .pack-sheen { opacity: 0; pointer-events: none; animation: sheen 5.4s ease-in-out infinite; }

      /* edge sparks — REUSED verbatim from the light-study widget. The layer is
         pinned to the pack's TOP seal; each .spark is a white→transparent streak
         with a warm box-shadow glow that grows up FROM the seal (origin at its
         base) when pack.js flicks it. */
      .spark-layer {
        position: absolute;
        top: 0; left: 0;
        width: 100%; height: 10%; /* spans the crimp to its BOTTOM line — same as the crimp streak */
        pointer-events: none;
      }
      .spark {
        position: absolute;
        bottom: 0;            /* root at the BOTTOM of the seal (the crimp line) */
        width: 2.5px;
        height: 140%;         /* span up THROUGH the seal and out past the top edge */
        border-radius: 2px;
        background: linear-gradient(#fff, rgba(255, 180, 110, 0)); /* bright head clears into the dark; tail trails to the seal */
        /* glow warms toward the hidden hit's tier as the rarity heat rises */
        box-shadow: 0 0 8px color-mix(in srgb, var(--tell, #ffa050) calc(var(--idle-heat, 0) * 75%), rgba(255, 160, 80, 0.9));
        transform-origin: bottom center; /* grows up from the seal bottom */
        opacity: 0;
        pointer-events: none;
      }

      /* tear-reference line — a horizontal beam-light streak along the BOTTOM of the
         sealed crimp (the same 14% line the sparks root on). Bright centre + warm
         glow, spilling past the edges for an anamorphic glint; gently pulses. Fades
         in only once the pack is armed (sibling of .pack.ready). */
      .crimp-streak {
        position: absolute;
        top: 10%;                     /* the sealed line — bottom of the crimp */
        transform: translateY(-50%);  /* centre the thick line on it */
        left: 0; width: 100%;         /* span the full pack width, edge to edge
                                         (width:100% overrides the SVG's intrinsic 300px) */
        height: 24px;
        pointer-events: none;
        opacity: 0;
        overflow: visible;            /* let the beam's glow spill */
        transition: opacity 0.35s ease;
      }
      .pack.ready ~ .crimp-streak { opacity: 1; }
      .pack-wrap.tearing .crimp-streak { opacity: 0; } /* disappears the moment a tear starts */
      .cs-base, .cs-beam { fill: none; vector-effect: non-scaling-stroke; stroke-linecap: round; }
      .cs-base { stroke: rgba(255, 205, 150, 0.5); stroke-width: 9; }        /* thick, steady guide */
      .cs-beam {                                                            /* the rim-light beam */
        stroke: #fff; stroke-width: 9;
        stroke-dasharray: 15 200;     /* one short bright segment */
        filter: drop-shadow(0 0 6px rgba(255, 175, 90, 0.95)) drop-shadow(0 0 2px #fff);
      }
      .pack.ready ~ .crimp-streak .cs-beam { animation: csbeam 2.8s ease-in-out infinite alternate; }
      @keyframes csbeam { /* the beam sweeps left -> right, then back (alternate) */
        0%   { stroke-dashoffset: 0; }
        100% { stroke-dashoffset: -85; }
      }
      @keyframes sheen {
        0%   { transform: translateX(-170px); opacity: 0; }
        8%   { opacity: 1; }
        30%  { transform: translateX(330px); opacity: 1; }
        40%  { opacity: 0; }
        100% { transform: translateX(330px); opacity: 0; }
      }

      /* Floating card backs — the booster's card back (assets/card-back.jpg)
         drifting up through the dark at different depths and angles, behind the
         pack and the reveal. Ambient "cards in the vault" backdrop. */
      .scene-fx { position: fixed; inset: 0; z-index: 0; pointer-events: none; overflow: hidden; }
      .float-card {
        position: absolute; bottom: -32%;
        width: 150px; aspect-ratio: 63 / 88;
        border-radius: 9px;
        background: #1f3a8a url("assets/card-back.jpg") center / cover no-repeat;
        box-shadow: 0 16px 50px rgba(0, 0, 0, 0.55);
        opacity: 0;
        filter: blur(var(--b, 0px)); /* far cards = blurrier (depth of field) */
        will-change: transform, opacity;
        animation: floatcard linear infinite;
      }
      @keyframes floatcard {
        0%   { transform: translateY(40px) rotate(var(--r, 0deg)) scale(var(--s, .5)); opacity: 0; }
        14%  { opacity: var(--o, .4); }
        86%  { opacity: var(--o, .4); }
        100% { transform: translateY(-132vh) rotate(var(--r, 0deg)) scale(var(--s, .5)); opacity: 0; }
      }

      .pack-fx {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
        pointer-events: none; /* never block the slash */
      }

      .hint {
        position: fixed;
        left: 0;
        right: 0;
        bottom: 26px;
        text-align: center;
        font-size: 13px;
        color: #9aa3b2;
        pointer-events: none;
      }

      /* ---- card-stack reveal (see src/reveal.js) -------------------------
       * The REAL card stack sits behind the pack (z-index 1) the whole time,
       * sized to fit inside it. The top card peeks through the tear gap as you
       * rip (the tear only cuts the foil — the cards stay whole). When the pack
       * opens it just drops away, uncovering that same stack IN PLACE — no
       * separate card popping out. Tapping flicks the top card off to the next. */
      .reveal {
        position: fixed;
        inset: 0;
        z-index: 1; /* behind the pack — stays behind; the pack drops away to uncover it */
        display: grid;
        place-items: center;
        --stackw: var(--card-detail-w); /* same size as the gallery's card — one card, one size (the bigger pack still covers it) */
        pointer-events: none; /* only the top card (once open) opts back in */
      }
      .reveal.hidden { display: none; }

      /* Iridescent backdrop — only painted in for a Double Rare-or-above pull.
         Layered conic + radial sweeps drift and hue-rotate so the whole scene
         shimmers behind the card. Off by default; fades in when .iridescent. */
      .reveal__aura {
        position: absolute;
        inset: -20%;
        pointer-events: none;
        opacity: 0;
        /* default = fade-OUT timing: snappy, so it clears as the card leaves */
        transition: opacity 0.45s ease-out;
        background:
          radial-gradient(120% 90% at 30% 20%, rgba(255, 93, 143, 0.55), transparent 60%),
          radial-gradient(110% 90% at 75% 30%, rgba(110, 168, 254, 0.55), transparent 60%),
          radial-gradient(120% 100% at 50% 85%, rgba(95, 207, 142, 0.5), transparent 62%),
          conic-gradient(from 0deg at 50% 50%,
            #ff5d8f, #ffd24a, #5fcf8e, #3fd6c8, #6ea8fe, #b072e6, #ff5d8f);
        background-blend-mode: screen;
        filter: blur(40px) saturate(1.3);
        will-change: opacity, transform, filter;
      }
      .reveal.iridescent .reveal__aura {
        opacity: 0.85;
        /* progressive build-IN: slow ramp so the colour washes in gradually */
        transition: opacity 1.6s ease-in;
        animation: aura-drift 12s linear infinite;
      }
      @keyframes aura-drift {
        0%   { transform: rotate(0deg)   scale(1.05); filter: blur(40px) saturate(1.3) hue-rotate(0deg); }
        50%  { transform: rotate(180deg) scale(1.15); filter: blur(48px) saturate(1.5) hue-rotate(180deg); }
        100% { transform: rotate(360deg) scale(1.05); filter: blur(40px) saturate(1.3) hue-rotate(360deg); }
      }
      @media (prefers-reduced-motion: reduce) {
        .reveal.iridescent .reveal__aura { animation: none; }
      }

      .reveal__fx {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
        pointer-events: none;
      }

      .reveal__stack {
        position: relative;
        width: var(--stackw);
        aspect-ratio: 63 / 88;
      }

      /* Each card sits in the stack at its depth (--d, 0 = top). The top card is
         what peeks through the gap and what's uncovered when the pack drops — it
         never springs or pops; it's simply there. */
      .reveal__slot {
        position: absolute;
        inset: 0;
        perspective: 1100px;
        /* while still inside the pack: tight + centered so no card edge pokes past
           the foil (only the top card shows, through the tear gap) */
        transform: scale(calc(1 - var(--d, 0) * 0.02));
        opacity: 1;
        transition: transform 0.5s ease, opacity 0.4s ease;
        touch-action: none;
        will-change: transform;
      }
      /* once the pack is open, the deck rests as a plain front-view stack — a small
         downward step just hints at the cards behind. The hand only fans out while
         you tap-and-hold, a motion driven slot-by-slot from reveal.js. */
      body.revealing .reveal__slot:not(.flung) {
        transform:
          translateY(calc(var(--d, 0) * 5px))
          scale(calc(1 - var(--d, 0) * 0.02));
      }
      .reveal__slot.flung {
        transform: translateY(-135%) rotate(-6deg) scale(1.02); /* flicked away to the next */
        opacity: 0;
      }
      /* while you drag the deck into a fanned hand (reveal.js), the spring writes
         each slot's transform every frame — kill the CSS easing so it tracks 1:1 */
      .reveal.browsing .reveal__slot {
        transition: none;
      }
      /* The card is the SAME component as the gallery — no size/shadow overrides;
         it fills the slot because --stackw equals the card's own --card-detail-w. */
      .reveal__slot .card--detail {
        width: 100%;
        height: 100%;
      }
      /* a rare pull adds a tier-colored glow on top of the card's own shadow */
      .reveal__slot.front.rare .card--detail {
        box-shadow:
          0 0 48px 4px color-mix(in srgb, var(--tier-color) 70%, transparent),
          0 40px 80px rgba(0, 0, 0, 0.6);
      }

      /* status block — count PIPS (primary, glanceable) + a teach sub-line. Fades
         in after the card lands; rides above the stage with a legibility floor so
         it survives the flash + iridescent aura. */
      .reveal__status {
        position: fixed;
        left: 0; right: 0; bottom: 26px;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 9px;
        pointer-events: none;
        opacity: 0;
        transition: opacity 0.4s ease;
        z-index: 330;
      }
      .reveal.show-status .reveal__status { opacity: 1; }
      .reveal__pips { display: flex; gap: 7px; }
      .pip {
        width: 7px; height: 7px;
        border-radius: 50%;
        background: rgba(255, 255, 255, 0.28);
        transition: transform 0.25s ease, background 0.25s ease, box-shadow 0.25s ease;
      }
      .pip.is-seen { background: color-mix(in srgb, var(--tier-color, #fff) 45%, rgba(255, 255, 255, 0.22)); }
      .pip.is-current {
        background: #fff;
        transform: scale(1.45);
        box-shadow: 0 0 8px color-mix(in srgb, var(--tier-color, #fff) 80%, #fff);
      }
      .reveal__hint {
        margin: 0;
        text-align: center;
        font-size: 12px;
        font-weight: 500;
        color: #e7ebf2;
        text-shadow: 0 1px 3px rgba(0, 0, 0, 0.7); /* legibility over a bright stage */
      }
      /* visually-hidden live region — announces the card to screen readers */
      .reveal__sr {
        position: fixed;
        width: 1px; height: 1px;
        margin: -1px; padding: 0; border: 0;
        overflow: hidden; clip: rect(0 0 0 0);
        white-space: nowrap;
      }
      .reveal__again {
        position: fixed;
        left: 50%;
        bottom: 54px;
        transform: translateX(-50%);
        padding: 11px 24px;
        border-radius: 999px;
        border: 1px solid var(--line, #2a313f);
        background: var(--bg-elev, #141821);
        color: #eef1f6;
        font: inherit;
        font-weight: 600;
        cursor: pointer;
        pointer-events: auto;
      }
      .reveal__again[hidden] { display: none; }

      /* ======================================================================
       *  THE HIT — sunburst rays, screen flash, anticipation tell, rarity stamp,
       *  interior glow, card entrance. All live inside the .reveal host and are
       *  gated/scaled per tier by reveal.js (a Double Rare just shimmers; a Hyper
       *  takes the whole screen). New selectors only — they don't touch the
       *  pack's open-light system above.
       * ==================================================================== */

      /* interior light — the opening glows so the first card rises out of light */
      .reveal__interior {
        position: absolute;
        left: 50%; top: 44%;
        width: 130%; height: 130%;
        transform: translate(-50%, -50%);
        pointer-events: none;
        opacity: 0;
        background: radial-gradient(closest-side,
          color-mix(in srgb, var(--tell, #ffd49e) 45%, transparent) 0%, transparent 66%);
        mix-blend-mode: screen;
        will-change: opacity;
      }

      /* rotating god-rays behind the hero card — one conic gradient, masked to a
         soft disc, spun by a cheap transform. The punch-in is a fast opacity ramp. */
      .reveal__rays {
        position: absolute;
        left: 50%; top: 44%;
        width: 165vmax; height: 165vmax;
        transform: translate(-50%, -50%) rotate(0deg);
        pointer-events: none;
        opacity: 0;
        background: repeating-conic-gradient(from 0deg,
          color-mix(in srgb, var(--tier-color, #fff) 85%, #fff) 0deg 2.2deg,
          transparent 2.2deg 11deg);
        -webkit-mask-image: radial-gradient(closest-side, #000 16%, rgba(0,0,0,0.5) 42%, transparent 72%);
        mask-image: radial-gradient(closest-side, #000 16%, rgba(0,0,0,0.5) 42%, transparent 72%);
        mix-blend-mode: screen;
        transition: opacity 0.3s ease;
        will-change: transform, opacity;
      }
      .reveal__rays.spin { animation: ray-spin 19s linear infinite; }
      .reveal__rays.spin.fast { animation-duration: 13s; }
      @keyframes ray-spin {
        from { transform: translate(-50%, -50%) rotate(0deg); }
        to   { transform: translate(-50%, -50%) rotate(360deg); }
      }
      .reveal__rays--fine {
        background: repeating-conic-gradient(from 4deg,
          color-mix(in srgb, var(--tier-color, #fff) 70%, #fff) 0deg 0.9deg,
          transparent 0.9deg 6deg);
      }
      .reveal__rays--fine.spin { animation: ray-spin-rev 24s linear infinite; }
      .reveal__rays--fine.spin.fast { animation-duration: 16s; }
      @keyframes ray-spin-rev {
        from { transform: translate(-50%, -50%) rotate(0deg); }
        to   { transform: translate(-50%, -50%) rotate(-360deg); }
      }

      /* full-stage white→tier flash — the visceral "HIT" punctuation */
      .reveal__flash {
        position: fixed;
        inset: 0;
        pointer-events: none;
        opacity: 0;
        background: radial-gradient(circle at 50% 44%,
          #fff 0%, color-mix(in srgb, var(--tier-color, #fff) 60%, #fff) 30%, transparent 70%);
        mix-blend-mode: screen;
        will-change: opacity;
      }

      /* anticipation TELL — colour leaks up behind the next card during the held
         beat, while the world dims, just before a rare is uncovered */
      .reveal__tell {
        position: absolute;
        left: 50%; top: 46%;
        width: 90%; height: 90%;
        transform: translate(-50%, -50%);
        pointer-events: none;
        opacity: 0;
        background: radial-gradient(closest-side,
          color-mix(in srgb, var(--tier-color, #fff) 70%, transparent) 0%, transparent 68%);
        mix-blend-mode: screen;
        transition: opacity 0.3s ease;
        will-change: opacity;
      }
      .reveal.telling .reveal__tell { opacity: 0.9; }
      .reveal__dim {
        position: fixed;
        inset: 0;
        pointer-events: none;
        opacity: 0;
        background: radial-gradient(120% 100% at 50% 44%, transparent 28%, rgba(2, 3, 6, 0.72) 80%);
        transition: opacity 0.35s ease;
      }
      .reveal.telling .reveal__dim { opacity: 1; }

      /* the rarity STAMP — the tier label punches in over the hero card */
      .reveal__stamp {
        position: absolute;
        left: 50%; top: 16%;
        transform: translate(-50%, -50%) scale(1.6);
        pointer-events: none;
        opacity: 0;
        font-size: clamp(15px, 4.4vw, 24px);
        font-weight: 800;
        letter-spacing: 0.3em;
        text-transform: uppercase;
        color: #fff;
        text-shadow: 0 0 14px var(--tier-color, #fff), 0 2px 10px rgba(0, 0, 0, 0.6);
        white-space: nowrap;
        will-change: transform, opacity;
      }

      /* card ENTRANCE — the uncovered hero rises + scales in with a hair of
         overshoot, ending exactly on the resting front-card transform (no jump). */
      /* the hero LANDS — rises, overshoots PAST rest (the contact dip at ~55% =
         ~250ms, which every impact cue in reveal.js syncs to: set-down sound,
         haptic, shadow peak), then settles exactly on the resting front transform
         (no jump when CSS takes back over). */
      .reveal__slot.front.entering { animation: card-enter 0.46s cubic-bezier(0.22, 1.16, 0.32, 1) both; }
      @keyframes card-enter {
        0%   { transform: translateY(34px) scale(0.9);   opacity: 0; }
        55%  { transform: translateY(-6px) scale(1.015); opacity: 1; } /* contact dip, past rest */
        78%  { transform: translateY(2px)  scale(0.997); opacity: 1; }
        100% { transform: translateY(0)    scale(1);     opacity: 1; }
      }

      /* a one-pass specular gleam sweeps the FRESH front card just after it lands
         — a "newly revealed" gleam even on a common. Clipped to the card face
         (overflow:hidden there) so the screen-blend band never lights the stage. */
      .reveal__slot.gleaming .card__face::after {
        content: "";
        position: absolute;
        inset: 0;
        pointer-events: none;
        background: linear-gradient(115deg, transparent 42%, rgba(255, 255, 255, 0.5) 50%, transparent 58%);
        mix-blend-mode: screen;
        animation: card-gleam 0.6s ease-out both;
      }
      @keyframes card-gleam {
        0%   { transform: translateX(-130%); opacity: 0; }
        25%  { opacity: 1; }
        100% { transform: translateX(130%);  opacity: 0; }
      }

      /* landing shadow — a soft floor ellipse under the stack that punches darker
         + tighter on the contact frame, then settles faint. Weight on arrival.
         Transform + opacity only (static blur), driven by a WAAPI keyframe. */
      .reveal__shadow {
        position: absolute;
        left: 50%; top: 60%;
        width: 56%; height: 13%;
        transform: translate(-50%, -50%) scaleX(1.3) scaleY(0.7);
        border-radius: 50%;
        background: radial-gradient(closest-side, rgba(0, 0, 0, 0.5), transparent 72%);
        filter: blur(7px); /* STATIC */
        opacity: 0;
        pointer-events: none;
        will-change: transform, opacity;
      }

      /* stacking order inside the reveal host: backdrop → rays → cards → sparkles
         → flash → stamp */
      .reveal__dim { z-index: 0; }
      .reveal__aura, .reveal__interior { z-index: 1; }
      .reveal__rays, .reveal__tell, .reveal__shadow { z-index: 2; }
      .reveal__stack { z-index: 10; }
      .reveal__fx { z-index: 150; }   /* sparkles spray in front of the card */
      .reveal__flash { z-index: 300; }
      .reveal__stamp { z-index: 320; }

      @media (prefers-reduced-motion: reduce) {
        .reveal__rays.spin, .reveal__rays--fine.spin { animation: none; }
        .reveal__slot.front.entering { animation: card-fade 0.4s ease both; }
        @keyframes card-fade { from { opacity: 0; } to { opacity: 1; } }
        .reveal__slot.gleaming .card__face::after { animation: none; display: none; } /* no gleam */
        .reveal__shadow { display: none; } /* no landing-shadow pulse */
      }
    </style>
  </head>
  <body class="holo-on show-tear-zone">
    <div class="scene-fx" aria-hidden="true">
      <div class="float-card" style="left:4%;  --s:.30; --r:-15deg; --o:.20; --b:3px;   animation-duration:36s; animation-delay:0s"></div>
      <div class="float-card" style="left:23%; --s:.52; --r:7deg;   --o:.42; --b:.4px;  animation-duration:27s; animation-delay:9s"></div>
      <div class="float-card" style="left:42%; --s:.36; --r:-6deg;  --o:.28; --b:1.6px; animation-duration:31s; animation-delay:4s"></div>
      <div class="float-card" style="left:64%; --s:.58; --r:13deg;  --o:.46; --b:0px;   animation-duration:24s; animation-delay:14s"></div>
      <div class="float-card" style="left:84%; --s:.33; --r:-19deg; --o:.23; --b:2.3px; animation-duration:34s; animation-delay:6s"></div>
      <div class="float-card" style="left:52%; --s:.44; --r:20deg;  --o:.34; --b:1px;   animation-duration:29s; animation-delay:19s"></div>
    </div>
    <nav class="app-nav app-nav--floating" aria-label="Sections">
      <a class="nav-link" href="index.html">Gallery</a>
      <a class="nav-link is-active" href="pack.html" aria-current="page">Open Pack</a>
    </nav>
    <button id="tear-zone-toggle" class="toggle app-toggle--floating on" role="switch" aria-checked="true" aria-label="Highlight the tear-trigger zone">
      <span class="toggle-track"><span class="toggle-thumb"></span></span>
      Tear zone
    </button>
    <div id="pack-stage"></div>
    <p class="hint">Preparing pack…</p>

    <script type="module">
      import { createPack } from "./src/pack.js";
      import { createReveal } from "./src/reveal.js";
      import { buildBooster } from "./src/booster.js";
      import { rarityToTier } from "./src/rarity.js";

      const hintEl = document.querySelector(".hint");
      const TEAR_HINT = "Drag a line across the pack to tear it open — it rips along your path.";
      let pack, reveal, ready;

      // "Tear zone" switch — show/hide the highlighted band where a tear can start.
      const tzToggle = document.getElementById("tear-zone-toggle");
      tzToggle.addEventListener("click", () => {
        const on = document.body.classList.toggle("show-tear-zone");
        tzToggle.classList.toggle("on", on);
        tzToggle.setAttribute("aria-checked", String(on));
      });

      // Build a booster AND render its card stack (hidden) up front, then ARM the
      // pack. The pack can't be torn until its cards are ready, so the reveal is
      // always instant — no fetch or render after the rip.
      function loadNextPack() {
        pack?.setArmed(false);
        hintEl.textContent = "Preparing pack…";
        ready = buildBooster().then((cards) => {
          cards.forEach((c) => { const im = new Image(); im.src = c.image; }); // warm hi-res
          reveal.prepare(cards); // pre-render the stack while the pack is still sealed
          // foreshadow the pull: tint the idle pack toward the rarest card inside
          pack.setTell(Math.max(...cards.map(rarityToTier)));
          pack.setArmed(true); // now it's safe to tear
          hintEl.textContent = TEAR_HINT;
        });
      }

      reveal = createReveal({
        mountEl: document.body,
        onAgain: () => {
          pack.reset(); // reseal the pack
          loadNextPack(); // and pre-load the next one
        },
      });

      pack = createPack({
        mountEl: document.getElementById("pack-stage"),
        onGrab: () => reveal.wake(), // bring the stack in behind the pack only once it's grabbed
        onOpen: async () => {
          hintEl.textContent = ""; // the reveal has its own hint
          await ready; // (already prepared — instant)
          reveal.show();
        },
      });

      loadNextPack(); // start loading the first pack immediately
    </script>
  </body>
</html>
