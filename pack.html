<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
    <title>OpenPack · slash prototype</title>
    <link rel="stylesheet" href="src/base.css" />
    <link rel="stylesheet" href="src/card.css" />
    <style>
      :root {
        color-scheme: dark;
      }
      html, body {
        margin: 0;
        height: 100%;
        background:
          radial-gradient(900px 600px at 50% -10%, rgba(155, 140, 255, 0.12), transparent 60%),
          #0b0d12;
        overflow: hidden;
        font-family: "Inter", system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
        color: #eef1f6;
        /* iOS ignores user-scalable=no, so kill the gestures that zoom/blow up the
           cards: double-tap-to-zoom, the long-press image preview, and selection. */
        touch-action: manipulation;
        -webkit-touch-callout: none;
        -webkit-user-select: none;
        user-select: none;
      }
      img { -webkit-user-drag: none; -webkit-touch-callout: none; }

      #pack-stage {
        position: fixed;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        touch-action: none; /* the slash drives the tear, never scrolls */
        z-index: 2;
        transition: transform 0.7s cubic-bezier(0.45, 0, 0.7, 0.45), opacity 0.6s;
        will-change: transform, opacity; /* promote a layer so mobile composites the slide smoothly */
      }
      /* once the pack is open, the remaining big half slides off — in the direction
         set by the tear (see pack.js: --exit-*, in px so iOS animates it), away from
         the opening, uncovering the cards behind it */
      body.revealing #pack-stage {
        pointer-events: none;
        transform: translate(var(--exit-x, 0px), var(--exit-y, 0px)) rotate(var(--exit-rot, 0deg));
        opacity: 0;
      }

      /* wraps the pack svg + the spark layer so both bob together on the idle float */
      .pack-wrap {
        position: relative;
        display: inline-block;
        animation: float 5s ease-in-out infinite;
        will-change: transform;
      }
      .pack {
        display: block;
        width: calc(var(--card-detail-w) * 1.1); /* just larger than the card it holds — hugs the card, not a giant sleeve */
        height: auto;
        overflow: visible;
        cursor: crosshair;
        user-select: none;
        -webkit-user-select: none;
        -webkit-touch-callout: none;
        -webkit-user-drag: none; /* never let a drag lift a ghost copy of the art */
        filter:
          drop-shadow(0 26px 52px rgba(0, 0, 0, 0.6))
          drop-shadow(0 0 13px rgba(255, 210, 156, 0.22)); /* light warm rim glow — breathes via @keyframes rim */
        animation: rim 4.6s ease-in-out infinite; /* float now lives on .pack-wrap (carries the sparks too) */
        opacity: 0; /* stay hidden until the card stack is prepared (pack.js adds .ready) */
        transition: opacity 0.45s ease;
      }
      /* armed = the booster's card stack is rendered behind it; only then does the
         pack fade in so there's never a pack with nothing to open behind it */
      .pack.ready { opacity: 1; }
      .pack image {
        -webkit-user-drag: none;
        pointer-events: none; /* the <g> handlers drive the tear; the image never grabs the drag */
      }

      /* The tear-trigger guide (drawn in pack.js as .tear-zone): the top & bottom
         crimp strips where a press starts a tear (not the sides or face). Hidden
         until the "Tear zone" toggle adds body.show-tear-zone — a debug aid you toggle. */
      .tear-zone {
        fill: color-mix(in srgb, var(--accent, #6ea8fe) 18%, transparent);
        stroke: var(--accent, #6ea8fe);
        stroke-width: 1.5;
        stroke-dasharray: 7 5;
        pointer-events: none;
        opacity: 0;
        transition: opacity 0.25s ease;
      }
      body.show-tear-zone .tear-zone { opacity: 1; }

      /* the on/off switch sits opposite the nav and bows out during a reveal */
      .app-toggle--floating {
        position: fixed;
        top: 14px;
        right: 14px;
        z-index: 10;
        backdrop-filter: blur(6px);
      }
      body.revealing .app-toggle--floating {
        opacity: 0;
        pointer-events: none;
        transition: opacity 0.3s ease;
      }

      @keyframes float {
        0%, 100% { transform: translateY(-6px) rotate(-0.4deg); }
        50% { transform: translateY(6px) rotate(0.4deg); }
      }
      /* rim light — the warm glow hugging the pack swells and settles */
      @keyframes rim {
        0%, 100% { filter: drop-shadow(0 26px 52px rgba(0,0,0,.6)) drop-shadow(0 0 10px rgba(255,212,158,.15)); }
        50%      { filter: drop-shadow(0 26px 52px rgba(0,0,0,.6)) drop-shadow(0 0 19px rgba(255,216,166,.32)); }
      }

      /* Specular sweep — a warm highlight band rolls across the foil every few
         seconds. The rect + #sheen gradient live in the SVG (see pack.js); screen
         blend brightens the foil it crosses, and the .sealed mask clips it to the pack. */
      .pack-sheen { opacity: 0; pointer-events: none; animation: sheen 5.4s ease-in-out infinite; }

      /* edge sparks — REUSED verbatim from the light-study widget. The layer is
         pinned to the pack's TOP seal; each .spark is a white→transparent streak
         with a warm box-shadow glow that grows up FROM the seal (origin at its
         base) when pack.js flicks it. */
      .spark-layer {
        position: absolute;
        top: 0; left: 0;
        width: 100%; height: 14%; /* spans the sealed crimp band: top edge → its BOTTOM line */
        pointer-events: none;
      }
      .spark {
        position: absolute;
        bottom: 0;            /* root at the BOTTOM of the seal (the crimp line) */
        width: 2.5px;
        height: 130%;         /* span up THROUGH the seal and out past the top edge */
        border-radius: 2px;
        background: linear-gradient(#fff, rgba(255, 180, 110, 0)); /* bright head clears into the dark; tail trails to the seal */
        box-shadow: 0 0 8px rgba(255, 160, 80, 0.9);
        transform-origin: bottom center; /* grows up from the seal bottom */
        opacity: 0;
        pointer-events: none;
      }
      @keyframes sheen {
        0%   { transform: translateX(-170px); opacity: 0; }
        8%   { opacity: 1; }
        30%  { transform: translateX(330px); opacity: 1; }
        40%  { opacity: 0; }
        100% { transform: translateX(330px); opacity: 0; }
      }

      /* Floating card backs — the booster's card back (assets/card-back.jpg)
         drifting up through the dark at different depths and angles, behind the
         pack and the reveal. Ambient "cards in the vault" backdrop. */
      .scene-fx { position: fixed; inset: 0; z-index: 0; pointer-events: none; overflow: hidden; }
      .float-card {
        position: absolute; bottom: -32%;
        width: 150px; aspect-ratio: 63 / 88;
        border-radius: 9px;
        background: #1f3a8a url("assets/card-back.jpg") center / cover no-repeat;
        box-shadow: 0 16px 50px rgba(0, 0, 0, 0.55);
        opacity: 0;
        filter: blur(var(--b, 0px)); /* far cards = blurrier (depth of field) */
        will-change: transform, opacity;
        animation: floatcard linear infinite;
      }
      @keyframes floatcard {
        0%   { transform: translateY(40px) rotate(var(--r, 0deg)) scale(var(--s, .5)); opacity: 0; }
        14%  { opacity: var(--o, .4); }
        86%  { opacity: var(--o, .4); }
        100% { transform: translateY(-132vh) rotate(var(--r, 0deg)) scale(var(--s, .5)); opacity: 0; }
      }

      .pack-fx {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
        pointer-events: none; /* never block the slash */
      }

      .hint {
        position: fixed;
        left: 0;
        right: 0;
        bottom: 26px;
        text-align: center;
        font-size: 13px;
        color: #9aa3b2;
        pointer-events: none;
      }

      /* ---- card-stack reveal (see src/reveal.js) -------------------------
       * The REAL card stack sits behind the pack (z-index 1) the whole time,
       * sized to fit inside it. The top card peeks through the tear gap as you
       * rip (the tear only cuts the foil — the cards stay whole). When the pack
       * opens it just drops away, uncovering that same stack IN PLACE — no
       * separate card popping out. Tapping flicks the top card off to the next. */
      .reveal {
        position: fixed;
        inset: 0;
        z-index: 1; /* behind the pack — stays behind; the pack drops away to uncover it */
        display: grid;
        place-items: center;
        --stackw: var(--card-detail-w); /* same size as the gallery's card — one card, one size (the bigger pack still covers it) */
        pointer-events: none; /* only the top card (once open) opts back in */
      }
      .reveal.hidden { display: none; }

      /* Iridescent backdrop — only painted in for a Double Rare-or-above pull.
         Layered conic + radial sweeps drift and hue-rotate so the whole scene
         shimmers behind the card. Off by default; fades in when .iridescent. */
      .reveal__aura {
        position: absolute;
        inset: -20%;
        pointer-events: none;
        opacity: 0;
        /* default = fade-OUT timing: snappy, so it clears as the card leaves */
        transition: opacity 0.45s ease-out;
        background:
          radial-gradient(120% 90% at 30% 20%, rgba(255, 93, 143, 0.55), transparent 60%),
          radial-gradient(110% 90% at 75% 30%, rgba(110, 168, 254, 0.55), transparent 60%),
          radial-gradient(120% 100% at 50% 85%, rgba(95, 207, 142, 0.5), transparent 62%),
          conic-gradient(from 0deg at 50% 50%,
            #ff5d8f, #ffd24a, #5fcf8e, #3fd6c8, #6ea8fe, #b072e6, #ff5d8f);
        background-blend-mode: screen;
        filter: blur(40px) saturate(1.3);
        will-change: opacity, transform, filter;
      }
      .reveal.iridescent .reveal__aura {
        opacity: 0.85;
        /* progressive build-IN: slow ramp so the colour washes in gradually */
        transition: opacity 1.6s ease-in;
        animation: aura-drift 12s linear infinite;
      }
      @keyframes aura-drift {
        0%   { transform: rotate(0deg)   scale(1.05); filter: blur(40px) saturate(1.3) hue-rotate(0deg); }
        50%  { transform: rotate(180deg) scale(1.15); filter: blur(48px) saturate(1.5) hue-rotate(180deg); }
        100% { transform: rotate(360deg) scale(1.05); filter: blur(40px) saturate(1.3) hue-rotate(360deg); }
      }
      @media (prefers-reduced-motion: reduce) {
        .reveal.iridescent .reveal__aura { animation: none; }
      }

      .reveal__fx {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
        pointer-events: none;
      }

      .reveal__stack {
        position: relative;
        width: var(--stackw);
        aspect-ratio: 63 / 88;
      }

      /* Each card sits in the stack at its depth (--d, 0 = top). The top card is
         what peeks through the gap and what's uncovered when the pack drops — it
         never springs or pops; it's simply there. */
      .reveal__slot {
        position: absolute;
        inset: 0;
        perspective: 1100px;
        /* while still inside the pack: tight + centered so no card edge pokes past
           the foil (only the top card shows, through the tear gap) */
        transform: scale(calc(1 - var(--d, 0) * 0.02));
        opacity: 1;
        transition: transform 0.5s ease, opacity 0.4s ease;
        touch-action: none;
        will-change: transform;
      }
      /* once the pack is open, the deck rests as a plain front-view stack — a small
         downward step just hints at the cards behind. The hand only fans out while
         you tap-and-hold, a motion driven slot-by-slot from reveal.js. */
      body.revealing .reveal__slot:not(.flung) {
        transform:
          translateY(calc(var(--d, 0) * 5px))
          scale(calc(1 - var(--d, 0) * 0.02));
      }
      .reveal__slot.flung {
        transform: translateY(-135%) rotate(-6deg) scale(1.02); /* flicked away to the next */
        opacity: 0;
      }
      /* while you drag the deck into a fanned hand (reveal.js), the spring writes
         each slot's transform every frame — kill the CSS easing so it tracks 1:1 */
      .reveal.browsing .reveal__slot {
        transition: none;
      }
      /* The card is the SAME component as the gallery — no size/shadow overrides;
         it fills the slot because --stackw equals the card's own --card-detail-w. */
      .reveal__slot .card--detail {
        width: 100%;
        height: 100%;
      }
      /* a rare pull adds a tier-colored glow on top of the card's own shadow */
      .reveal__slot.front.rare .card--detail {
        box-shadow:
          0 0 48px 4px color-mix(in srgb, var(--tier-color) 70%, transparent),
          0 40px 80px rgba(0, 0, 0, 0.6);
      }

      .reveal__hint {
        position: fixed;
        left: 0;
        right: 0;
        bottom: 30px;
        margin: 0;
        text-align: center;
        font-size: 13px;
        color: #9aa3b2;
        pointer-events: none;
      }
      .reveal__again {
        position: fixed;
        left: 50%;
        bottom: 54px;
        transform: translateX(-50%);
        padding: 11px 24px;
        border-radius: 999px;
        border: 1px solid var(--line, #2a313f);
        background: var(--bg-elev, #141821);
        color: #eef1f6;
        font: inherit;
        font-weight: 600;
        cursor: pointer;
        pointer-events: auto;
      }
      .reveal__again[hidden] { display: none; }
    </style>
  </head>
  <body class="holo-on show-tear-zone">
    <div class="scene-fx" aria-hidden="true">
      <div class="float-card" style="left:4%;  --s:.30; --r:-15deg; --o:.20; --b:3px;   animation-duration:36s; animation-delay:0s"></div>
      <div class="float-card" style="left:23%; --s:.52; --r:7deg;   --o:.42; --b:.4px;  animation-duration:27s; animation-delay:9s"></div>
      <div class="float-card" style="left:42%; --s:.36; --r:-6deg;  --o:.28; --b:1.6px; animation-duration:31s; animation-delay:4s"></div>
      <div class="float-card" style="left:64%; --s:.58; --r:13deg;  --o:.46; --b:0px;   animation-duration:24s; animation-delay:14s"></div>
      <div class="float-card" style="left:84%; --s:.33; --r:-19deg; --o:.23; --b:2.3px; animation-duration:34s; animation-delay:6s"></div>
      <div class="float-card" style="left:52%; --s:.44; --r:20deg;  --o:.34; --b:1px;   animation-duration:29s; animation-delay:19s"></div>
    </div>
    <nav class="app-nav app-nav--floating" aria-label="Sections">
      <a class="nav-link" href="index.html">Gallery</a>
      <a class="nav-link is-active" href="pack.html" aria-current="page">Open Pack</a>
    </nav>
    <button id="tear-zone-toggle" class="toggle app-toggle--floating on" role="switch" aria-checked="true" aria-label="Highlight the tear-trigger zone">
      <span class="toggle-track"><span class="toggle-thumb"></span></span>
      Tear zone
    </button>
    <div id="pack-stage"></div>
    <p class="hint">Preparing pack…</p>

    <script type="module">
      import { createPack } from "./src/pack.js";
      import { createReveal } from "./src/reveal.js";
      import { buildBooster } from "./src/booster.js";

      const hintEl = document.querySelector(".hint");
      const TEAR_HINT = "Drag a line across the pack to tear it open — it rips along your path.";
      let pack, reveal, ready;

      // "Tear zone" switch — show/hide the highlighted band where a tear can start.
      const tzToggle = document.getElementById("tear-zone-toggle");
      tzToggle.addEventListener("click", () => {
        const on = document.body.classList.toggle("show-tear-zone");
        tzToggle.classList.toggle("on", on);
        tzToggle.setAttribute("aria-checked", String(on));
      });

      // Build a booster AND render its card stack (hidden) up front, then ARM the
      // pack. The pack can't be torn until its cards are ready, so the reveal is
      // always instant — no fetch or render after the rip.
      function loadNextPack() {
        pack?.setArmed(false);
        hintEl.textContent = "Preparing pack…";
        ready = buildBooster().then((cards) => {
          cards.forEach((c) => { const im = new Image(); im.src = c.image; }); // warm hi-res
          reveal.prepare(cards); // pre-render the stack while the pack is still sealed
          pack.setArmed(true); // now it's safe to tear
          hintEl.textContent = TEAR_HINT;
        });
      }

      reveal = createReveal({
        mountEl: document.body,
        onAgain: () => {
          pack.reset(); // reseal the pack
          loadNextPack(); // and pre-load the next one
        },
      });

      pack = createPack({
        mountEl: document.getElementById("pack-stage"),
        onGrab: () => reveal.wake(), // bring the stack in behind the pack only once it's grabbed
        onOpen: async () => {
          hintEl.textContent = ""; // the reveal has its own hint
          await ready; // (already prepared — instant)
          reveal.show();
        },
      });

      loadNextPack(); // start loading the first pack immediately
    </script>
  </body>
</html>
