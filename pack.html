<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
    <title>OpenPack · slash prototype</title>
    <link rel="stylesheet" href="src/base.css" />
    <link rel="stylesheet" href="src/card.css" />
    <style>
      :root {
        color-scheme: dark;
      }
      html, body {
        margin: 0;
        height: 100%;
        background:
          radial-gradient(900px 600px at 50% -10%, rgba(155, 140, 255, 0.12), transparent 60%),
          #0b0d12;
        overflow: hidden;
        font-family: "Inter", system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
        color: #eef1f6;
      }

      #pack-stage {
        position: fixed;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        touch-action: none; /* the slash drives the tear, never scrolls */
        z-index: 2; /* the pack sits IN FRONT of the rising cards (which emerge from behind it) */
      }
      /* once a pack is open, its taps belong to the cards rising behind it */
      body.revealing #pack-stage {
        pointer-events: none;
      }

      .pack {
        width: min(64vw, 46vh, 320px);
        height: auto;
        overflow: visible;
        cursor: crosshair;
        user-select: none;
        -webkit-user-select: none;
        -webkit-touch-callout: none;
        -webkit-user-drag: none; /* never let a drag lift a ghost copy of the art */
        filter: drop-shadow(0 30px 60px rgba(0, 0, 0, 0.6));
        animation: float 5s ease-in-out infinite;
      }
      .pack image {
        -webkit-user-drag: none;
        pointer-events: none; /* the <g> handlers drive the tear; the image never grabs the drag */
      }

      @keyframes float {
        0%, 100% { transform: translateY(-6px) rotate(-0.4deg); }
        50% { transform: translateY(6px) rotate(0.4deg); }
      }

      .pack-fx {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
        pointer-events: none; /* never block the slash */
      }

      .pack-logo {
        font-size: 30px;
        font-weight: 800;
        font-style: italic;
        letter-spacing: 0.5px;
        fill: #fff;
        paint-order: stroke;
        stroke: rgba(11, 13, 18, 0.35);
        stroke-width: 3px;
      }
      .pack-sub {
        font-size: 12px;
        font-weight: 700;
        letter-spacing: 0.28em;
        fill: rgba(255, 255, 255, 0.82);
      }

      .hint {
        position: fixed;
        left: 0;
        right: 0;
        bottom: 26px;
        text-align: center;
        font-size: 13px;
        color: #9aa3b2;
        pointer-events: none;
      }

      /* ---- card-stack reveal (see src/reveal.js) -------------------------
       * The reveal sits BEHIND the pack (z-index 1 < pack's 2). Cards rest
       * tucked inside the pack (hidden behind the opaque foil); the front card
       * rises UP so its top clears the foil while its base stays behind it —
       * it looks like the card is sliding out of the opened pack. */
      .reveal {
        position: fixed;
        inset: 0;
        z-index: 1;
        display: grid;
        place-items: center;
        --stackw: min(58vw, 40vh, 300px);
        --rise: -62%; /* how far the front card lifts out of the pack */
        pointer-events: none; /* only the front card opts back in */
      }
      .reveal.hidden { display: none; }

      .reveal__fx {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
        pointer-events: none;
      }

      .reveal__stack {
        position: relative;
        width: var(--stackw);
        aspect-ratio: 63 / 88;
      }

      .reveal__slot {
        position: absolute;
        inset: 0;
        perspective: 1100px;
        transform: translateY(0) scale(0.97); /* resting: tucked in the pack */
        opacity: 0;
        transition: transform 0.6s cubic-bezier(0.2, 0.8, 0.2, 1), opacity 0.45s, box-shadow 0.4s;
        touch-action: none;
        will-change: transform;
      }
      .reveal__slot.front {
        transform: translateY(var(--rise)) scale(1); /* risen out of the pack */
        opacity: 1;
        pointer-events: auto;
      }
      .reveal__slot.flung {
        transform: translateY(calc(var(--rise) - 80%)) rotate(-6deg) scale(1.04); /* pulled away */
        opacity: 0;
      }
      .reveal__slot .card--detail {
        --w: var(--stackw);
        width: 100%;
        height: 100%;
        box-shadow: 0 24px 50px rgba(0, 0, 0, 0.6);
      }
      .reveal__slot.front.rare .card--detail {
        box-shadow:
          0 0 48px 4px color-mix(in srgb, var(--tier-color) 70%, transparent),
          0 24px 50px rgba(0, 0, 0, 0.6);
      }

      .reveal__hint {
        position: fixed;
        left: 0;
        right: 0;
        bottom: 30px;
        margin: 0;
        text-align: center;
        font-size: 13px;
        color: #9aa3b2;
        pointer-events: none;
      }
      .reveal__again {
        position: fixed;
        left: 50%;
        bottom: 54px;
        transform: translateX(-50%);
        padding: 11px 24px;
        border-radius: 999px;
        border: 1px solid var(--line, #2a313f);
        background: var(--bg-elev, #141821);
        color: #eef1f6;
        font: inherit;
        font-weight: 600;
        cursor: pointer;
        pointer-events: auto;
      }
      .reveal__again[hidden] { display: none; }
    </style>
  </head>
  <body class="holo-on">
    <div id="pack-stage"></div>
    <p class="hint">Drag a line across the pack to tear it open — it rips along your path.</p>

    <script type="module">
      import { createPack } from "./src/pack.js";
      import { createReveal } from "./src/reveal.js";
      import { buildBooster } from "./src/booster.js";

      let pack, reveal, ready;

      // Build a booster AND render its card stack (hidden) up front, so the
      // moment the pack tears the reveal just shows — nothing to fetch or build.
      function loadNextPack() {
        ready = buildBooster().then((cards) => {
          cards.forEach((c) => { const im = new Image(); im.src = c.image; }); // warm hi-res
          reveal.prepare(cards); // pre-render the stack while the pack is still sealed
        });
      }

      reveal = createReveal({
        mountEl: document.body,
        onAgain: () => {
          pack.reset(); // reseal the pack
          loadNextPack(); // and pre-load the next one
        },
      });

      pack = createPack({
        mountEl: document.getElementById("pack-stage"),
        onOpen: async () => {
          await ready; // (already prepared in the common case — instant)
          reveal.show();
        },
      });

      loadNextPack(); // start loading the first pack immediately
    </script>
  </body>
</html>
